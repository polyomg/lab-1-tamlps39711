<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tính hình chữ nhật</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg">
        <div class="card-header text-center bg-primary text-white">
          <h4>Tính diện tích & chu vi HCN</h4>
        </div>
        <div class="card-body">
          <form th:action="@{/hcn/check}" method="post">
            <div class="mb-3">
              <label class="form-label">Chiều dài</label>
              <input type="text" name="length" th:value="${length}" class="form-control"
                     placeholder="Nhập chiều dài">
            </div>

            <div class="mb-3">
              <label class="form-label">Chiều rộng</label>
              <input type="text" name="width" th:value="${width}" class="form-control"
                     placeholder="Nhập chiều rộng">
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success">Tính</button>
            </div>
          </form>

          <p th:if="${error}" th:text="${error}" class="text-danger mt-3"></p>

          <div th:if="${area != null}" class="alert alert-info mt-3">
            <p><strong>Diện tích:</strong> <span th:text="${area}"></span></p>
            <p><strong>Chu vi:</strong> <span th:text="${peri}"></span></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
